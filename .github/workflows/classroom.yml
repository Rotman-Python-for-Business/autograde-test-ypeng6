name: Module 4 Autograding

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  autograde:
    runs-on: ubuntu-latest

    steps:
      - name: Check out student repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install autograding dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-autograde.txt

      - name: Run workflow-completeness tests
        run: |
          pytest -q tests/test_workflow_completeness.py
